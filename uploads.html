<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080b14;
    --bg-2:#0d1220;
    --cyan:#00f0ff;
    --magenta:#ff3ec9;
    --violet:#8b5cf6;
    --text:#e8f1ff;
    --muted:#647089;
    --card:#0f1524;
    --border:rgba(0,240,255,0.18);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ambient neon grid background */
  .grid-bg{
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, #000 40%, transparent 100%);
    z-index:0;
  }

  .glow-orb{
    position:fixed;
    width:600px;height:600px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.25;
    z-index:0;
    pointer-events:none;
  }
  .glow-orb.one{background:var(--cyan);top:-200px;left:-150px;}
  .glow-orb.two{background:var(--magenta);bottom:-250px;right:-150px;}

  header{
    position:relative;
    z-index:2;
    text-align:center;
    padding:64px 24px 40px;
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:4px;
    color:var(--cyan);
    text-transform:uppercase;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow::before{
    content:'';
    width:8px;height:8px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 10px var(--cyan), 0 0 20px var(--cyan);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:0.4; transform:scale(0.7);}
  }

  h1{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:clamp(36px,7vw,64px);
    letter-spacing:1px;
    margin-top:16px;
    background:linear-gradient(90deg,var(--cyan),var(--violet) 50%,var(--magenta));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 40px rgba(0,240,255,0.25);
  }

  .subtitle{
    color:var(--muted);
    font-size:15px;
    margin-top:12px;
    max-width:480px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.6;
  }

  .status-bar{
    position:relative;
    z-index:2;
    max-width:1100px;
    margin:0 auto 30px;
    padding:0 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--muted);
  }
  .status-bar .count{color:var(--cyan);font-weight:500;}

  main{
    position:relative;
    z-index:2;
    max-width:1100px;
    margin:0 auto;
    padding:0 24px 100px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:20px;
  }

  .card{
    background:linear-gradient(160deg, var(--card), #0a0e1a);
    border:1px solid var(--border);
    border-radius:14px;
    padding:22px;
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:translateY(16px);
    animation:rise 0.5s ease forwards;
    transition:border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
  }
  .card::before{
    content:'';
    position:absolute;
    inset:-1px;
    padding:1px;
    border-radius:14px;
    background:linear-gradient(135deg, transparent 40%, var(--cyan) 100%);
    opacity:0;
    transition:opacity 0.3s ease;
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 40px rgba(0,240,255,0.12);
    border-color:rgba(0,240,255,0.4);
  }
  .card:hover::before{opacity:1;}

  @keyframes rise{
    to{opacity:1; transform:translateY(0);}
  }

  .file-icon{
    width:44px;height:44px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:19px;
    margin-bottom:16px;
    background:rgba(0,240,255,0.08);
    border:1px solid var(--border);
  }

  .file-name{
    font-size:15px;
    font-weight:600;
    word-break:break-word;
    margin-bottom:4px;
    line-height:1.35;
  }

  .file-meta{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:18px;
  }

  .download-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:10px 14px;
    background:transparent;
    border:1px solid var(--cyan);
    color:var(--cyan);
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    text-decoration:none;
    cursor:pointer;
    transition:background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
  }
  .download-btn:hover{
    background:var(--cyan);
    color:#031014;
    box-shadow:0 0 20px rgba(0,240,255,0.5);
  }
  .download-btn svg{width:14px;height:14px;flex-shrink:0;}

  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:70px 24px;
    color:var(--muted);
    border:1px dashed var(--border);
    border-radius:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    line-height:1.8;
  }
  .empty-state strong{color:var(--text); font-family:'Inter',sans-serif; font-size:16px; display:block; margin-bottom:10px;}
  .empty-state code{
    background:rgba(0,240,255,0.08);
    padding:2px 6px;
    border-radius:4px;
    color:var(--cyan);
  }

  @media (prefers-reduced-motion: reduce){
    .card, .eyebrow::before{animation:none !important;}
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-orb one"></div>
<div class="glow-orb two"></div>

<header>
  <span class="eyebrow">Live Folder Sync</span>
  <h1>UPLOAD VAULT</h1>
  <p class="subtitle">Every file dropped into <strong>Html_files</strong> shows up here automatically, ready to grab with one click.</p>
</header>

<div class="status-bar">
  <span id="statusText">Scanning folder…</span>
  <span><span class="count" id="fileCount">0</span> files detected</span>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>
  const FOLDER = './Html_files/';

  const ICONS = {
    pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗',
    ppt:'📙', pptx:'📙', zip:'🗜️', rar:'🗜️',
    png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', svg:'🖼️', webp:'🖼️',
    mp4:'🎬', mov:'🎬', mp3:'🎵', wav:'🎵',
    txt:'📄', csv:'📊', json:'🗂️', html:'🌐', js:'⚙️', css:'🎨',
    default:'📦'
  };

  function getExt(name){
    const parts = name.split('.');
    return parts.length > 1 ? parts.pop().toLowerCase() : '';
  }

  function iconFor(name){
    return ICONS[getExt(name)] || ICONS.default;
  }

  function card(name, href){
    const ext = getExt(name).toUpperCase() || 'FILE';
    return `
      <div class="card">
        <div class="file-icon">${iconFor(name)}</div>
        <div class="file-name">${name}</div>
        <div class="file-meta">${ext}</div>
        <a class="download-btn" href="${href}" download="${name}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/>
          </svg>
          Download
        </a>
      </div>`;
  }

  function emptyState(message){
    return `<div class="empty-state">
      <strong>No files found yet</strong>
      ${message}
    </div>`;
  }

  async function loadFiles(){
    const grid = document.getElementById('grid');
    const statusText = document.getElementById('statusText');
    const fileCount = document.getElementById('fileCount');

    try{
      const res = await fetch(FOLDER);
      if(!res.ok) throw new Error('folder not reachable');
      const html = await res.text();

      const doc = new DOMParser().parseFromString(html, 'text/html');
      const links = Array.from(doc.querySelectorAll('a'))
        .map(a => a.getAttribute('href'))
        .filter(href => href && !href.startsWith('?') && !href.startsWith('/') && href !== '../' && href !== './');

      const files = [...new Set(links)].map(href => decodeURIComponent(href.replace(/\/$/, '')));

      if(files.length === 0){
        grid.innerHTML = emptyState(`Drop files into <code>Html_files</code> and refresh this page.`);
        statusText.textContent = 'Folder is empty';
        fileCount.textContent = '0';
        return;
      }

      grid.innerHTML = files.map((name, i) => {
        const el = card(name, FOLDER + encodeURIComponent(name));
        return el.replace('<div class="card">', `<div class="card" style="animation-delay:${i * 0.06}s">`);
      }).join('');

      statusText.textContent = 'Folder synced';
      fileCount.textContent = files.length;

    }catch(err){
      grid.innerHTML = emptyState(
        `This browser/server couldn't list <code>Html_files</code> automatically.<br>
         Make sure directory listing is enabled on your server (e.g. Apache <code>Options +Indexes</code>,
         or run a static server like <code>python -m http.server</code>), and that this HTML file
         sits right next to the <code>Html_files</code> folder.`
      );
      statusText.textContent = 'Auto-detect unavailable';
      fileCount.textContent = '0';
    }
  }

  loadFiles();
</script>

</body>
</html>
